# model: gemma4:26b
model: gemma4:31b-it-bf16

prompt:
  type: zero_shot
  file: prompts/zero_shot/v1.txt

params:
  temperature: 0.0
  top_p: 0.9
  top_k: 40
  seed: 42
  thinking_timeout_seconds: 600

evaluation:
  iou_threshold: 0.5

data:
  samples_dir: data/inputs/samples
  ground_truth_dir: data/ground_truth
  outputs_dir: data/outputs
